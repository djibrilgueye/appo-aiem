    <path fill="#FFD700" d="M-15,-25 L-12,-28 L-8,-26 L-5,-28 L-2,-26 L2,-24 L6,-26 L10,-23 L12,-20 L10,-15 L12,-10 L10,-5 L6,0 L8,5 L10,10 L8,15 L5,20 L2,25 L0,28 L-5,30 L-10,32 L-15,30 L-18,27 L-20,23 L-22,18 L-24,13 L-25,8 L-26,3 L-25,-2 L-23,-7 L-20,-12 L-17,-17 L-15,-22 Z"/>
